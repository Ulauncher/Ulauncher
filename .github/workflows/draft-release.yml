name: Draft release

on:
  push:
    tags:
      - "*"

jobs:
  draft_release:
    runs-on: ubuntu-latest
    container: ulauncher/build-image:6.6
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Set up virtual environment
        run: make venv
      - name: Generate release notes
        # actions/checkout only adds safe.directory to a temporary git config, and the
        # workspace mount is owned by the host runner user, so git-cliff (libgit2) errors
        # with "repository path is not owned by current user" without this
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          .venv/bin/git-cliff --current > RELEASE_NOTES.md
      - name: Check
        run: make check
      - name: Build release
        run: |
          VERSION=$(make version)
          echo "Building Ulauncher version: $VERSION"
          ln -s /var/node_modules preferences-src # use node modules from cache
          make deb DEB_DISTRO=focal
          # make sure to run make sdist after make deb because make deb overwrites the tarball
          make sdist

      - name: Make draft GitHub release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.tar.gz
            dist/*.deb
