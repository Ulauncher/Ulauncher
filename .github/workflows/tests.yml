name: Tests

on:
  push:
    branches:
      - "*"
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    container: ulauncher/build-image:6.6
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ hashFiles('requirements.txt') }}
      - name: venv
        run: make venv QUIET=1
      - name: ruff
        run: make ruff
      - name: pyrefly
        run: make pyrefly
      - name: typo
        run: make typos
      - name: pytest
        run: make pytest
  nix-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: make nix-build
        run: make nix-build
        timeout-minutes: 5
