[changelog]
body = """
{% if commits | length != 0 %}
## What's Changed{% for group, commits in commits | filter(attribute="merge_commit", value=false) | group_by(attribute="group") %}

### {{ group | striptags | trim }}
{% for commit in commits %}* {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | replace_regex(from="( +\\(#\\d+\\))+$", to="") | upper_first }}{% if commit.links | length > 0 %} ({% for link in commit.links %}[{{ link.text }}]({{ link.href }}){% if not loop.last %}, {% endif %}{% endfor %}){% else %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/Ulauncher/Ulauncher/commit/{{ commit.id }})){% endif %}{% if commit.breaking_description and commit.breaking_description != commit.message %}
  > {{ commit.breaking_description | upper_first }}{% endif %}
{% endfor %}{% endfor %}
{% else %}
## What's Changed

* No user-facing changes were captured for this release.
{% endif %}
"""
trim = false

[git]
conventional_commits = true
filter_unconventional = true
filter_commits = true
sort_commits = "oldest"
tag_pattern = "v[0-9].*"
link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/Ulauncher/Ulauncher/pull/$1" },
]
# Group names carry <!-- N --> prefixes so git-cliff sorts them correctly;
# striptags in the template strips these before rendering.
#
# To omit a follow-up commit from the changelog (e.g. one that should have been
# part of an earlier commit but was made separately), add an `Amends:` trailer
# to the commit body. The first parser below skips any commit with such a
# trailer. Two forms:
# Amends: <sha>           - when the amended commit is already on main
# Amends: HEAD^ or HEAD~2 - when the amended commit is in the same PR (survives the
#                           SHA churn from GitHub's rebase-merge, since the literal
#                           text is preserved and rebase-merge keeps commit order)
#
# NOTE: The filtering will just skip it unconditionally, so ONLY use this if the original
# commit has not yet been released.
commit_parsers = [
    { footer = "^Amends:", skip = true },
    { footer = "^BREAKING[ -]?CHANGE", group = "<!-- -1 -->💥 Breaking Changes" },
    { message = "^[a-z]+(\\(.+\\))?!:", group = "<!-- -1 -->💥 Breaking Changes" },
    { message = "^feat(\\(.+\\))?!?:", group = "<!-- 0 -->✨ New Features" },
    { message = "^fix(\\(.+\\))?!?:", group = "<!-- 1 -->🐛 Bug Fixes" },
    { message = "^perf(\\(.+\\))?!?:", group = "<!-- 2 -->⚡ Performance" },
    { message = "^(build|chore|ci|docs|refactor|style|test)(\\(.+\\))?!?:", skip = true },
    { message = "^revert(\\(.+\\))?!?:", skip = true },
]
